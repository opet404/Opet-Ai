<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpetAI</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 15px;
      background: #181818;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #2a2a2a;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 80%;
      padding: 12px;
      border-radius: 12px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .user {
      background: #7c3aed;
      align-self: flex-end;
    }

    .bot {
      background: #222;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      padding: 10px;
      gap: 10px;
      background: #181818;
      border-top: 1px solid #2a2a2a;
    }

    input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      outline: none;
      background: #222;
      color: white;
      font-size: 16px;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #7c3aed;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="header">
    OpetAI
  </div>

  <div id="chat"></div>

  <div class="input-box">
    <input
      type="text"
      id="prompt"
      placeholder="Tulis pesan..."
    />

    <button onclick="sendMessage()">
      Kirim
    </button>
  </div>

  <script>

    // GANTI DENGAN URL VERCEL BACKEND LU
    const API_URL = "https://opet-ai-vercel-app.vercel.app/api/chat";

    const chat = document.getElementById("chat");
    const input = document.getElementById("prompt");

    function addMessage(text, type) {

      const div = document.createElement("div");

      div.className = `msg ${type}`;
      div.innerText = text;

      chat.appendChild(div);

      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {

      const prompt = input.value.trim();

      if (!prompt) return;

      addMessage(prompt, "user");

      input.value = "";

      addMessage("Mengetik...", "bot");

      try {

        const response = await fetch(API_URL, {
          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify({
            prompt
          })
        });

        const data = await response.json();

        // hapus typing
        chat.removeChild(chat.lastChild);

        addMessage(
          data.result || "Tidak ada respon",
          "bot"
        );

      } catch (err) {

        chat.removeChild(chat.lastChild);

        addMessage(
          "Error: " + err.message,
          "bot"
        );
      }
    }

    input.addEventListener("keypress", e => {

      if (e.key === "Enter") {
        sendMessage();
      }
    });

  </script>
</body>
</html>
